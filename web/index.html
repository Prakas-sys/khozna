<!DOCTYPE html>
<html lang="en">

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Khozna – Find Your Perfect Home. Browse, discover and connect with real estate listings across Nepal.">
  <meta name="theme-color" content="#00A3E1">

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Khozna – Find Your Perfect Home">
  <meta property="og:description" content="Browse, discover and connect with real estate listings across Nepal.">
  <meta property="og:image" content="icons/Icon-192.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="#00A3E1">
  <meta name="apple-mobile-web-app-title" content="Khozna">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Khozna – Find Your Perfect Home</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Loading screen shown while Flutter initializes */
    body {
      margin: 0;
      background: linear-gradient(135deg, #0077B6 0%, #00A3E1 50%, #48CAE4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #loading-screen img {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      background: white;
      padding: 12px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
      animation: pulse 1.5s ease-in-out infinite;
    }

    #loading-screen h1 {
      font-family: 'Georgia', serif;
      color: white;
      font-size: 28px;
      letter-spacing: 6px;
      margin: 0;
    }

    #loading-screen p {
      font-family: sans-serif;
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      margin: 0;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.06);
      }
    }
  </style>
</head>

<body>
  <!-- Web loading screen (shown before Flutter renders) -->
  <div id="loading-screen">
    <img src="icons/Icon-192.png" alt="Khozna Logo">
    <h1>KHOZNA</h1>
    <p>Find Your Perfect Home</p>
  </div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
